name: Energy AI CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            numpy==1.26.4 \
            pandas==2.1.4 \
            joblib \
            lightgbm \
            scikit-learn \
            psycopg2-binary \
            requests \
            python-dotenv

      - name: Verify Python packages
        run: |
          python - <<'EOF'
          import numpy
          import pandas
          import lightgbm
          import sklearn
          import psycopg2
          import joblib
          print("All imports OK")
          EOF

      - name: Compile source code
        run: |
          python -m compileall src
